version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: techflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-techflow}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - techflow_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: techflow_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-techflow}:${POSTGRES_PASSWORD:-techflow_secret}@postgres:5432/${POSTGRES_DB:-techflow}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://draw.g3ra.ru}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - techflow_network
      - proxy
    command: sh -c "cd /app/apps/api && npx prisma migrate deploy && node dist/index.js"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # API routes (/api/*)
      - "traefik.http.routers.techflow-api.rule=Host(`draw.g3ra.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.techflow-api.entrypoints=websecure"
      - "traefik.http.routers.techflow-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.techflow-api.priority=100"
      - "traefik.http.routers.techflow-api.service=techflow-api-svc"

      # WebSocket routes (/ws)
      - "traefik.http.routers.techflow-ws.rule=Host(`draw.g3ra.ru`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.techflow-ws.entrypoints=websecure"
      - "traefik.http.routers.techflow-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.techflow-ws.priority=100"
      - "traefik.http.routers.techflow-ws.service=techflow-api-svc"

      # Uploads routes (/uploads/*)
      - "traefik.http.routers.techflow-uploads.rule=Host(`draw.g3ra.ru`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.techflow-uploads.entrypoints=websecure"
      - "traefik.http.routers.techflow-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.routers.techflow-uploads.priority=100"
      - "traefik.http.routers.techflow-uploads.service=techflow-api-svc"

      # Service definition
      - "traefik.http.services.techflow-api-svc.loadbalancer.server.port=3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: techflow_web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - techflow_network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Catch-all for frontend (lower priority)
      - "traefik.http.routers.techflow-web.rule=Host(`draw.g3ra.ru`)"
      - "traefik.http.routers.techflow-web.entrypoints=websecure"
      - "traefik.http.routers.techflow-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.techflow-web.priority=10"
      - "traefik.http.services.techflow-web.loadbalancer.server.port=80"

volumes:
  postgres_data:
  api_uploads:

networks:
  techflow_network:
    driver: bridge
  proxy:
    external: true