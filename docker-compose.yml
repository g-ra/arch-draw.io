version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: techflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: techflow
      POSTGRES_PASSWORD: techflow_secret
      POSTGRES_DB: techflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
